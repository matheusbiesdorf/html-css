<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: "love lady" ;
            src: url('fontes/lovelady.ttf')format('truetype');
            font-weight: normal;
            font-style: normal ;
        }
        /* 
        Tipos de format()
        opentype(otf)
        truetype(ttf)
        */
        body{
            font-family: 'love lady', Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'love lady' ,'Times New Roman', Times, serif;
            font-size: 3em;
        }
    </style>
</head>

<body>
    <h1>Título</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Labore dolorem dolor impedit ipsum illum sequi nesciunt? Rerum distinctio at quae commodi perferendis iure ex libero, dolores repellendus rem exercitationem nihil!</p>
</body>
</html>
